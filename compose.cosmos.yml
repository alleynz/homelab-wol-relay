services:
  wol-relay:
    image: ghcr.io/YOUR_GITHUB_USERNAME/wol-relay:latest
    container_name: wol-relay
    restart: unless-stopped
    volumes:
      - type: bind
        source: /opt/wol-relay/config
        target: /config
        read_only: true
    networks:
      - cosmos-app-default

networks:
  cosmos-app-default:
    external: true
